# ─── Nginx — Destrava Crédito ────────────────────────────────────────────────
# ATENÇÃO: Este arquivo é para deploy MANUAL (sem Coolify).
#
# Se você usa Coolify, o Traefik já faz o proxy reverso automaticamente.
# Nesse caso, este arquivo NÃO é necessário — o Coolify configura tudo
# via labels Docker ao apontar o domínio destrava.permupay.com.br → porta 4000.
#
# Use este arquivo apenas se quiser rodar Nginx diretamente na VPS
# (fora do Coolify) com PM2.
#
# Salve em: /etc/nginx/sites-available/destrava-credito
# Ative com: sudo ln -s /etc/nginx/sites-available/destrava-credito /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

# Redirecionar HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name destrava.permupay.com.br;

    # ACME challenge para Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name destrava.permupay.com.br;

    # SSL — gerado pelo certbot (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/destrava.permupay.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/destrava.permupay.com.br/privkey.pem;

    # Parâmetros SSL modernos
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # HSTS (habilite após confirmar que SSL está funcionando)
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cabeçalhos de segurança
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # Compressão Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Proxy reverso → Node.js na porta 4000 ────────────────────────────────
    # PORTA 4000: evita conflito com Chatwoot (3000) na mesma VPS
    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Headers de forwarding
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Buffer
        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # ── Cache de assets estáticos (Vite gera hashes nos nomes) ───────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Assets do Vite têm hash no nome → cache longo e imutável
        expires            1y;
        add_header         Cache-Control "public, immutable";
        access_log         off;
    }

    # ── SPA fallback: todas as rotas retornam index.html ─────────────────────
    # (já tratado pelo Express, mas como fallback de segurança)
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Tamanho máximo de upload ──────────────────────────────────────────────
    client_max_body_size 10M;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/destrava-credito-access.log;
    error_log  /var/log/nginx/destrava-credito-error.log warn;
}
